<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>MaxSAT Runner UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <h1 class="mb-4">MaxSAT Runner UI</h1>

  <!-- Form -->
  <form id="runForm" class="card p-3">
    <div class="mb-3">
      <label for="instances_dir" class="form-label">Instances dir</label>
      <input type="text" class="form-control" id="instances_dir" value="instances/demo">
    </div>

    <div class="mb-3">
      <label for="pattern" class="form-label">Pattern</label>
      <input type="text" class="form-control" id="pattern" value=".wcnf">
    </div>

    <div class="mb-3">
      <label for="out_dir" class="form-label">Out dir</label>
      <input type="text" class="form-control" id="out_dir" value="runs">
    </div>

    <div class="mb-3">
      <label for="tag" class="form-label">Tag</label>
      <input type="text" class="form-control" id="tag" value="web_run">
    </div>

    <div class="mb-3">
      <label for="timeout_sec" class="form-label">Timeout (sec)</label>
      <input type="number" class="form-control" id="timeout_sec" placeholder="optionnel">
    </div>

    <h5>Liste des solveurs</h5>
    <div id="solversList"></div>
    <button type="button" class="btn btn-sm btn-primary mt-2" onclick="addSolver()">+ Ajouter un solver</button>

    <hr>
    <button type="button" class="btn btn-success" onclick="submitJob()">Lancer</button>
  </form>

  <!-- Résultat -->
  <div class="mt-4">
    <h3>Résultat</h3>
    <pre id="out" class="bg-white p-3 border"></pre>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
